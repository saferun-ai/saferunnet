# SaferunNet configuration (Lokinet-compatible INI format)
# see https://github.com/oxen-io/lokinet for reference

[router]
nickname=saferunnet-node
data_dir=./var/lib/saferunnet
bind_port=1090
rpc_port=1190
oxend-rpc=http://127.0.0.1:22023/json_rpc
# bootstrap nodes (comma-separated router IDs or files)
# bootstrap=node1.signed,node2.signed

[logging]
level=info

[network]
keyfile=identity.key
# Uncomment for exit node:
# exit=true
# ifaddr=10.0.0.1/16
# exit-node=some-exit-node-id

[dns]
upstream=8.8.8.8:53
bind_addr=127.3.2.1:53
add_resolvers=true
